<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>FlimsyFishing</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a2634;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: linear-gradient(to bottom, #74b9ff 0%, #0984e3 50%, #00cec9 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* Top UI */
        header {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 10;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-title {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #ff7675;
            text-shadow: 1px 1px 2px #000;
        }
        .money { color: #fed330; text-shadow: 1px 1px #000; font-weight: bold; font-size: 1.1rem; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.9;
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Scenery Area */
        #scenery {
            flex: 1;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Action Button */
        #action-btn {
            position: absolute;
            bottom: 25%;
            right: 20px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: #ff7675;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #d63031, 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
            z-index: 5;
        }
        #action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d63031, 0 5px 10px rgba(0,0,0,0.3);
        }
        #action-btn.waiting { background: #fdcb6e; box-shadow: 0 6px 0 #e17055; }
        #action-btn.biting { background: #2ecc71; box-shadow: 0 6px 0 #27ae60; animation: pulse 0.4s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Minigame Bar */
        #minigame-container {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 30px;
            background: #333;
            border: 3px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            display: none;
            z-index: 10;
        }
        #target-zone {
            position: absolute;
            height: 100%;
            background: #2ecc71;
        }
        #indicator {
            position: absolute;
            width: 8px;
            height: 100%;
            background: #ff7675;
            box-shadow: 0 0 5px #000;
            left: 0;
        }

        /* In-Game Feedback Alert Text */
        #game-toast {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 8px 20px;
            font-weight: bold;
            border-radius: 20px;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
            z-index: 15;
            animation: bounceIn 0.3s ease;
        }
        @keyframes bounceIn {
            0% { transform: translateX(-50%) scale(0.7); opacity: 0; }
            80% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* Catch Display / Modals */
        .modal {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            background: rgba(0, 0, 0, 0.93);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            display: none;
            z-index: 20;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .rarity-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        
        /* Navigation/Tabs Layout */
        #nav-tabs {
            display: flex;
            background: #2c3e50;
            height: 45px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #bdc3c7;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
            border-top: 3px solid #00cec9;
        }
        #panel-content {
            height: 220px;
            background: #1e272e;
            overflow-y: auto;
            padding: 10px;
            border-top: 2px solid #2c3e50;
        }

        /* Items List Configurations */
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2f3640;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 5px;
        }
        .buy-btn {
            background: #2ecc71;
            border: none;
            color: white;
            padding: 6px 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .buy-btn:disabled { background: #7f8c8d; }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .index-card {
            background: #2f3640;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.75rem;
            border: 1px solid #3d4654;
        }
        .index-card.discovered { background: #130f40; border-color: #00cec9; }
        .index-title {
            grid-column: span 3;
            font-weight: bold;
            color: #fdcb6e;
            margin: 8px 0 4px 0;
            font-size: 0.85rem;
            border-bottom: 1px dashed #57606f;
        }
        .shop-section-header {
            font-size: 0.8rem;
            font-weight: bold;
            color: #00cec9;
            background: #2c3e50;
            padding: 4px 8px;
            margin: 8px 0 4px 0;
            border-radius: 3px;
        }
    </style>
</head>

    // --- CANVAS GRAPHICS RENDERING ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        drawScene();
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let w = canvas.width;
        let h = canvas.height;
        let dockY = h * 0.75;
        let dockWidth = w * 0.45;

        ctx.fillStyle = "#8c7ae6";
        ctx.fillRect(0, dockY, dockWidth, 20);
        ctx.fillStyle = "#482ff7";
        ctx.fillRect(0, dockY + 20, dockWidth, 8);

        let pX = dockWidth - 60; 
        let pY = dockY;

        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        ctx.beginPath(); ctx.moveTo(pX - 6, pY); ctx.lineTo(pX - 6, pY - 24); ctx.stroke(); 
        ctx.beginPath(); ctx.moveTo(pX + 6, pY); ctx.lineTo(pX + 6, pY - 24); ctx.stroke(); 
        ctx.beginPath(); ctx.moveTo(pX, pY - 24); ctx.lineTo(pX, pY - 56); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pX, pY - 48); ctx.lineTo(pX + 16, pY - 42); ctx.stroke();

        ctx.fillStyle = "#ffdd59";
        ctx.beginPath();
        ctx.arc(pX, pY - 66, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        let currentRod = RODS[gameState.currentRodIndex];
        let rodOriginX = pX + 14;
        let rodOriginY = pY - 42;
        
        let angle = -Math.PI / 6; 
        let tipX = rodOriginX + Math.cos(angle) * currentRod.length;
        let tipY = rodOriginY + Math.sin(angle) * currentRod.length;

        ctx.strokeStyle = currentRod.color;
        ctx.lineWidth = currentRod.thick;
        ctx.beginPath();
        ctx.moveTo(rodOriginX, rodOriginY);
        ctx.lineTo(tipX, tipY);
        ctx.stroke();

        ctx.strokeStyle = "rgba(236, 240, 241, 0.7)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);

        if (gameState.status === 'waiting' || gameState.status === 'biting' || gameState.status === 'minigame') {
            let waterLineX = w * 0.72;
            ctx.lineTo(waterLineX, h - 30);
            ctx.stroke();

            ctx.fillStyle = gameState.status === 'biting' ? "#e74c3c" : "#ff7675";
            ctx.beginPath();
            let jitter = gameState.status === 'biting' ? Math.sin(Date.now() * 0.05) * 4 : 0;
            ctx.arc(waterLineX, (h - 30) + jitter, 5, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.lineTo(tipX, tipY + 45);
            ctx.stroke();
        }
    }

    setInterval(drawScene, 50);

    // --- INTERACTIVE ACTIONS ENGINE ---
    const actionBtn = document.getElementById('action-btn');
    
    ['touchstart', 'mousedown'].forEach(evtType => {
        actionBtn.addEventListener(evtType, function(e) {
            e.preventDefault();
            handleAction();
        });
    });

    function showTextFeedback(text) {
        const toast = document.getElementById('game-toast');
        toast.innerText = text;
        toast.style.display = 'block';
        
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.style.display = 'none';
        }, 1500);
    }

    function handleAction() {
        if (gameState.status === 'idle') {
            startCasting();
        } else if (gameState.status === 'waiting') {
            clearTimeout(biteTimeout);
            resetToIdle("Missed!");
        } else if (gameState.status === 'biting') {
            startMinigame();
        } else if (gameState.status === 'minigame') {
            checkMinigameResult();
        }
    }

    function startCasting() {
        gameState.status = 'waiting';
        actionBtn.innerText = "WAITING";
        actionBtn.className = "waiting";
        
        let waitTime = 1200 + Math.random() * 2500;
        biteTimeout = setTimeout(() => { triggerBite(); }, waitTime);
    }

    function triggerBite() {
        gameState.status = 'biting';
        actionBtn.innerText = "HOOK!";
        actionBtn.className = "biting";

        biteTimeout = setTimeout(() => {
            consumeBaitUnit(); // Consumes bait when missing the bite window
            resetToIdle("Missed!");
        }, 1300);
    }

    function startMinigame() {
        clearTimeout(biteTimeout);
        gameState.status = 'minigame';
        actionBtn.innerText = "PULL!";
        actionBtn.className = "";

        const currentRod = RODS[gameState.currentRodIndex];
        const minigameBar = document.getElementById('minigame-container');
        const targetZone = document.getElementById('target-zone');
        
        minigameBar.style.display = 'block';
        
        let zoneWidth = currentRod.zoneSize;
        minigameData.targetStart = Math.random() * (100 - zoneWidth);
        minigameData.targetEnd = minigameData.targetStart + zoneWidth;
        
        targetZone.style.left = minigameData.targetStart + '%';
        targetZone.style.width = zoneWidth + '%';
        
        minigameData.indicatorPos = 0;
        minigameData.direction = 1;
        minigameData.speed = currentRod.speed;

        animateMinigame();
    }

    function animateMinigame() {
        if (gameState.status !== 'minigame') return;

        minigameData.indicatorPos += minigameData.speed * minigameData.direction;
        if (minigameData.indicatorPos >= 100) {
            minigameData.indicatorPos = 100;
            minigameData.direction = -1;
        } else if (minigameData.indicatorPos <= 0) {
            minigameData.indicatorPos = 0;
            minigameData.direction = 1;
        }

        document.getElementById('indicator').style.left = minigameData.indicatorPos + '%';
        minigameData.animationFrame = requestAnimationFrame(animateMinigame);
    }

    function checkMinigameResult() {
        cancelAnimationFrame(minigameData.animationFrame);
        document.getElementById('minigame-container').style.display = 'none';

        let pos = minigameData.indicatorPos;
        consumeBaitUnit(); // Bait consumed on pull attempts
        
        if (pos >= minigameData.targetStart && pos <= minigameData.targetEnd) {
            generateFish();
        } else {
            resetToIdle("Missed!");
        }
    }

    function consumeBaitUnit() {
        if (gameState.currentBaitId !== 'default') {
            gameState.baitInventory[gameState.currentBaitId]--;
            if (gameState.baitInventory[gameState.currentBaitId] <= 0) {
                delete gameState.baitInventory[gameState.currentBaitId];
                gameState.currentBaitId = 'default';
            }
        }
        updateUI();
    }

    // --- PROCEDURAL GENERATOR ---
    function generateFish() {
        let rand = Math.random() * 100;
        let selectedRarityKey = 'COMMON';
        let cumulative = 0;
        
        const keys = Object.keys(RARITIES);
        for (let key of keys) {
            cumulative += RARITIES[key].chance;
            if (rand <= cumulative) {
                selectedRarityKey = key;
                break;
            }
        }
        let rarity = RARITIES[selectedRarityKey];
        let baseName = BASE_FISH[Math.floor(Math.random() * BASE_FISH.length)];

        let mutationCount = 0;
        let mutRoll = Math.random();
        if (mutRoll > 0.96) mutationCount = 4;
        else if (mutRoll > 0.88) mutationCount = 3;
        else if (mutRoll > 0.68) mutationCount = 2;
        else if (mutRoll > 0.33) mutationCount = 1;

        let shuffledMut = [...MUTATIONS].sort(() => 0.5 - Math.random());
        let activeMutations = shuffledMut.slice(0, mutationCount);

        let baseValue = 15 + Math.floor(Math.random() * 25);
        let flatAddition = 0;
        let mutationMultiplier = 1.0;

        activeMutations.forEach(m => {
            flatAddition += m.valueAdd;
            mutationMultiplier *= m.mult;
            gameState.discoveredMutations[m.name] = true;
        });

        gameState.discoveredFish[baseName] = true;

        // Apply dynamic calculation multiplier values based on active equipped Bait
        let equippedBaitObj = BAITS.find(b => b.id === gameState.currentBaitId) || BAITS[0];
        let finalValue = Math.floor((baseValue + flatAddition) * rarity.mult * mutationMultiplier * equippedBaitObj.mult);
        
        let mutationPrefix = activeMutations.map(m => m.name).join("-");
        let fullName = mutationPrefix ? `${mutationPrefix} ${baseName}` : baseName;

        generatedCatch = {
            name: fullName,
            rarityKey: selectedRarityKey,
            value: finalValue,
            mutationCount: mutationCount,
            mutationsList: activeMutations.map(m => m.name).join(", ") || "None"
        };

        const modal = document.getElementById('catch-modal');
        const rTag = document.getElementById('catch-rarity');
        
        rTag.innerText = rarity.name;
        rTag.style.backgroundColor = rarity.color;
        document.getElementById('catch-name').innerText = fullName;
        document.getElementById('catch-mutations').innerText = `Mutations (${mutationCount}): ${generatedCatch.mutationsList}`;
        document.getElementById('catch-value').innerText = finalValue;
        
        modal.style.display = 'block';
    }

    function closeCatchModal() {
        if (generatedCatch) {
            gameState.money += generatedCatch.value;
            gameState.catchLog.unshift({...generatedCatch});
            if (gameState.catchLog.length > 20) gameState.catchLog.pop();
            
            generatedCatch = null; 
            updateUI();
        }
        document.getElementById('catch-modal').style.display = 'none';
        resetToIdle();
    }

    function resetToIdle(textFeedback = "") {
        gameState.status = 'idle';
        actionBtn.innerText = "CAST";
        actionBtn.className = "";
        document.getElementById('minigame-container').style.display = 'none';
        if (textFeedback) {
            showTextFeedback(textFeedback);
        }
    }

    // --- UI NAVIGATION & TABS ---
    function updateUI() {
        document.getElementById('money-display').innerText = gameState.money;
        document.getElementById('rod-display').innerText = RODS[gameState.currentRodIndex].name;
        
        let equippedBaitObj = BAITS.find(b => b.id === gameState.currentBaitId) || BAITS[0];
        let currentBaitQty = gameState.baitInventory[gameState.currentBaitId];
        document.getElementById('bait-display').innerText = `${equippedBaitObj.name} (${currentBaitQty === Infinity ? '∞' : currentBaitQty})`;
        
        renderPanel();
    }

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('tab-shop').classList.toggle('active', tab === 'shop');
        document.getElementById('tab-bait').classList.toggle('active', tab === 'bait');
        document.getElementById('tab-log').classList.toggle('active', tab === 'log');
        document.getElementById('tab-index').classList.toggle('active', tab === 'index');
        renderPanel();
    }

    function renderPanel() {
        const container = document.getElementById('panel-content');
        container.innerHTML = "";

        if (activeTab === 'shop') {
            RODS.forEach((rod, index) => {
                if (index === 0) return;
                let isOwned = index <= gameState.currentRodIndex;
                let canAfford = gameState.money >= rod.cost;
                
                let itemDiv = document.createElement('div');
                itemDiv.className = 'shop-item';
                let infoText = `<strong>${rod.name}</strong><br><span style="font-size:0.72rem; color:#aaa;">Slightly wider catch window</span>`;
                let actionItem = '';

                if (isOwned) {
                    actionItem = `<span style="color:#2ecc71; font-weight:bold; font-size:0.85rem;">Equipped</span>`;
                } else {
                    if (index === gameState.currentRodIndex + 1) {
                        actionItem = `<button class="buy-btn" ${!canAfford ? 'disabled' : ''} onclick="buyRod(${index}, ${rod.cost})">$${rod.cost.toLocaleString()}</button>`;
                    } else {
                        actionItem = `<span style="color:#7f8c8d; font-size:0.8rem;">Locked</span>`;
                    }
                }
                itemDiv.innerHTML = `<div>${infoText}</div><div>${actionItem}</div>`;
                container.appendChild(itemDiv);
            });

        } else if (activeTab === 'bait') {
            let sections = ['Insects', 'Marine', 'Synthetic', 'Cosmic'];
            
            sections.forEach(secName => {
                let secHeader = document.createElement('div');
                secHeader.className = 'shop-section-header';
                secHeader.innerText = `${secName.toUpperCase()} CLASSIFICATION BAITS`;
                container.appendChild(secHeader);

                let filtered = BAITS.filter(b => b.type === secName);
                filtered.forEach(bait => {
                    let itemDiv = document.createElement('div');
                    itemDiv.className = 'shop-item';
                    
                    let qtyOwned = gameState.baitInventory[bait.id] || 0;
                    let isEquipped = gameState.currentBaitId === bait.id;
                    let canAfford = gameState.money >= bait.cost;

                    let infoText = `<strong>${bait.name}</strong> [x${bait.count}]<br><span style="font-size:0.7rem; color:#fed330;">Value Mult: x${bait.mult.toFixed(1)}</span> <span style="font-size:0.7rem; color:#aaa;">(Stock: ${qtyOwned})</span>`;
                    
                    let actionItem = `<button class="buy-btn" ${!canAfford ? 'disabled' : ''} onclick="buyBait('${bait.id}', ${bait.cost}, ${bait.count})">$${bait.cost.toLocaleString()}</button>`;
                    if (isEquipped && bait.id !== 'default') {
                        actionItem = `<div style="display:flex; flex-direction:column; gap:2px;"><span style="color:#2ecc71; font-weight:bold; font-size:0.75rem; text-align:center;">Active</span><button class="buy-btn" style="padding:2px 6px; font-size:0.65rem; background:#34495e;" ${!canAfford ? 'disabled' : ''} onclick="buyBait('${bait.id}', ${bait.cost}, ${bait.count})">+Buy</button></div>`;
                    } else if (qtyOwned > 0 && bait.id !== 'default') {
                        actionItem = `<div style="display:flex; flex-direction:column; gap:2px;"><button class="buy-btn" style="background:#3498db; padding:4px 8px; font-size:0.75rem;" onclick="equipBait('${bait.id}')">Equip</button><button class="buy-btn" style="padding:2px 6px; font-size:0.65rem; background:#34495e;" ${!canAfford ? 'disabled' : ''} onclick="buyBait('${bait.id}', ${bait.cost}, ${bait.count})">+Buy</button></div>`;
                    }

                    itemDiv.innerHTML = `<div>${infoText}</div><div>${actionItem}</div>`;
                    container.appendChild(itemDiv);
                });
            });

        } else if (activeTab === 'log') {
            if (gameState.catchLog.length === 0) {
                container.innerHTML = `<p style="color:#7f8c8d; text-align:center; padding-top:20px;">No fish caught yet.</p>`;
                return;
            }
            gameState.catchLog.forEach(item => {
                let logDiv = document.createElement('div');
                logDiv.style.borderBottom = "1px solid #2c3e50";
                logDiv.style.padding = "6px 0";
                logDiv.style.display = "flex";
                logDiv.style.justifyContent = "space-between";
                
                let color = RARITIES[item.rarityKey].color;
                logDiv.innerHTML = `
                    <div style="font-size:0.85rem;">
                        <span style="color:${color}; font-weight:bold;">[${item.rarityKey[0]}]</span> ${item.name}
                    </div>
                    <div style="color:#fed330; font-size:0.85rem;">+$${item.value}</div>
                `;
                container.appendChild(logDiv);
            });

        } else if (activeTab === 'index') {
            let indexWrapper = document.createElement('div');
            indexWrapper.className = 'index-grid';

            let title1 = document.createElement('div');
            title1.className = 'index-title';
            title1.innerText = `BASE SPECIES DISCOVERED (${Object.keys(gameState.discoveredFish).length}/${BASE_FISH.length})`;
            indexWrapper.appendChild(title1);

            BASE_FISH.forEach(fish => {
                let card = document.createElement('div');
                let found = gameState.discoveredFish[fish];
                card.className = `index-card ${found ? 'discovered' : ''}`;
                card.innerText = found ? fish : "???";
                indexWrapper.appendChild(card);
            });

            let title2 = document.createElement('div');
            title2.className = 'index-title';
            title2.innerText = `MUTATION GENES ISOLATED (${Object.keys(gameState.discoveredMutations).length}/${MUTATIONS.length})`;
            indexWrapper.appendChild(title2);

            MUTATIONS.forEach(mut => {
                let card = document.createElement('div');
                let found = gameState.discoveredMutations[mut.name];
                card.className = `index-card ${found ? 'discovered' : ''}`;
                card.innerText = found ? mut.name : "???";
                indexWrapper.appendChild(card);
            });

            container.appendChild(indexWrapper);
        }
    }

    function buyRod(index, cost) {
        if (gameState.money >= cost) {
            gameState.money -= cost;
            gameState.currentRodIndex = index;
            updateUI();
            drawScene();
        }
    }

    function buyBait(id, cost, count) {
        if (gameState.money >= cost) {
            gameState.money -= cost;
            if (!gameState.baitInventory[id]) {
                gameState.baitInventory[id] = 0;
            }
            gameState.baitInventory[id] += count;
            gameState.currentBaitId = id; // Auto-equips upon purchase
            updateUI();
        }
    }

    function equipBait(id) {
        if (gameState.baitInventory[id] > 0) {
            gameState.currentBaitId = id;
            updateUI();
        }
    }

    updateUI();
</script>
